<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or "PubWiSec" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pubwisec.css') }}">
</head>
<body class="inside-scoop-body">

<div class="app-shell">
  <aside class="side-nav">
    <div class="brand-block">
      <div class="brand-logo-wrap text-logo-badge">IS</div>

      <div class="brand-copy">
        <div class="brand-title">PubWiSec</div>
        <div class="brand-subtitle">Inside Scoop Cafe</div>
      </div>
    </div>

    <nav class="menu-list">
      <a href="{{ url_for('dashboard') }}" class="menu-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
        <span>Dashboard</span>
      </a>

      <a href="{{ url_for('alerts') }}" class="menu-item {% if request.endpoint == 'alerts' %}active{% endif %}">
        <span>Alerts</span>
      </a>

      <a href="{{ url_for('password_history') }}" class="menu-item {% if request.endpoint == 'password_history' %}active{% endif %}">
        <span>Password Rotation</span>
      </a>

      <a href="{{ url_for('advisory') }}" class="menu-item {% if request.endpoint == 'advisory' %}active{% endif %}">
        <span>Customer Advisory</span>
      </a>
    </nav>

    <div class="side-footer">
      <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </div>
  </aside>

  <main class="page-main">
    <div class="topbar">
      <div class="topbar-text">INSIDE SCOOP PUBLIC WI-FI SECURITY SYSTEM</div>
      <div class="topbar-badge">Cafe Monitoring Dashboard</div>
    </div>

    <div class="page-content">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

</body>
</html>
